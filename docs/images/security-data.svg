<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-labelledby="title desc">
<title id="title">easy-LocalHub security and data boundaries</title><desc id="desc">Room code gates API access, input is validated, and data remains on the host.</desc>
<defs><style>.bg{fill:#f8fafc}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:22}.ok{fill:#dcfce7;stroke:#86efac}.warn{fill:#fef3c7;stroke:#fcd34d}.t{font:700 22px system-ui,Segoe UI,Arial;fill:#0f172a}.h{font:700 18px system-ui,Segoe UI,Arial;fill:#1e293b}.s{font:14px system-ui,Segoe UI,Arial;fill:#475569}.line{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.shield{fill:#2563eb}</style></defs><rect width="960" height="400" rx="28" class="bg"/>
<text x="40" y="54" class="t">数据边界与安全加固</text><text x="40" y="82" class="s">适合可信局域网：房间码是访问门槛，服务端再做路径、体积、文本和响应头约束。</text>
<rect class="card" x="55" y="125" width="235" height="170"/><text x="172" y="170" text-anchor="middle" class="h">🌐 浏览器</text><text x="172" y="202" text-anchor="middle" class="s">输入房间码</text><text x="172" y="228" text-anchor="middle" class="s">发送消息 / 文件</text>
<rect class="card ok" x="365" y="105" width="230" height="210"/><path class="shield" d="M480 135l62 24v45c0 42-29 70-62 82-33-12-62-40-62-82v-45z" opacity=".14"/><text x="480" y="158" text-anchor="middle" class="h">🛡️ server.mjs</text><text x="480" y="198" text-anchor="middle" class="s">POST /api/room/join 校验</text><text x="480" y="224" text-anchor="middle" class="s">safeJoin 防路径逃逸</text><text x="480" y="250" text-anchor="middle" class="s">JSON / 上传体积限制</text><text x="480" y="276" text-anchor="middle" class="s">nosniff / no-referrer</text>
<rect class="card" x="670" y="125" width="235" height="170"/><text x="788" y="168" text-anchor="middle" class="h">💾 本地 data/</text><text x="788" y="202" text-anchor="middle" class="s">messages/*.jsonl</text><text x="788" y="228" text-anchor="middle" class="s">uploads/&lt;room&gt;/</text><text x="788" y="254" text-anchor="middle" class="s">不会上传云端</text>
<path class="line" d="M290 210H365M595 210H670"/><text x="327" y="197" text-anchor="middle" class="s">API</text><text x="633" y="197" text-anchor="middle" class="s">落盘</text>
<rect class="card warn" x="170" y="330" width="620" height="42"/><text x="480" y="357" text-anchor="middle" class="s">边界：不提供公网级鉴权、TLS 或病毒扫描；公网暴露前请加反向代理与强认证。</text>
</svg>
