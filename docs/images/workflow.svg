<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
<title id="title">easy-LocalHub workflow</title><desc id="desc">Install, start, join, chat, upload and download workflow.</desc>
<defs><style>.bg{fill:#fff7ed}.step{fill:#fff;stroke:#fed7aa;stroke-width:2;rx:20}.num{fill:#f97316}.t{font:700 20px system-ui,Segoe UI,Arial;fill:#111827}.s{font:14px system-ui,Segoe UI,Arial;fill:#4b5563}.a{stroke:#fb923c;stroke-width:4;fill:none;stroke-linecap:round}.arr{fill:#fb923c}</style></defs><rect width="960" height="360" rx="28" class="bg"/>
<text x="42" y="54" class="t">从部署到协作：6 步闭环</text><text x="42" y="80" class="s">房主只需启动一次服务；参与者通过浏览器加入后即可聊天和传文件。</text>
<g transform="translate(45 125)"><rect class="step" width="125" height="125"/><circle class="num" cx="28" cy="28" r="18"/><text x="28" y="35" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">1</text><text class="t" x="62" y="55" text-anchor="middle">Clone</text><text class="s" x="62" y="84" text-anchor="middle">获取项目</text></g>
<g transform="translate(190 125)"><rect class="step" width="125" height="125"/><circle class="num" cx="28" cy="28" r="18"/><text x="28" y="35" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">2</text><text class="t" x="62" y="55" text-anchor="middle">Install</text><text class="s" x="62" y="84" text-anchor="middle">设置房间码</text></g>
<g transform="translate(335 125)"><rect class="step" width="125" height="125"/><circle class="num" cx="28" cy="28" r="18"/><text x="28" y="35" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">3</text><text class="t" x="62" y="55" text-anchor="middle">Start</text><text class="s" x="62" y="84" text-anchor="middle">监听 LAN</text></g>
<g transform="translate(480 125)"><rect class="step" width="125" height="125"/><circle class="num" cx="28" cy="28" r="18"/><text x="28" y="35" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">4</text><text class="t" x="62" y="55" text-anchor="middle">Join</text><text class="s" x="62" y="84" text-anchor="middle">输入房间码</text></g>
<g transform="translate(625 125)"><rect class="step" width="125" height="125"/><circle class="num" cx="28" cy="28" r="18"/><text x="28" y="35" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">5</text><text class="t" x="62" y="55" text-anchor="middle">Chat</text><text class="s" x="62" y="84" text-anchor="middle">消息持久化</text></g>
<g transform="translate(770 125)"><rect class="step" width="125" height="125"/><circle class="num" cx="28" cy="28" r="18"/><text x="28" y="35" text-anchor="middle" font-size="18" fill="#fff" font-weight="700">6</text><text class="t" x="62" y="55" text-anchor="middle">Files</text><text class="s" x="62" y="84" text-anchor="middle">上传 / 下载</text></g>
<path class="a" d="M170 188H190M315 188H335M460 188H480M605 188H625M750 188H770"/><polygon class="arr" points="188,188 176,181 176,195"/><polygon class="arr" points="333,188 321,181 321,195"/><polygon class="arr" points="478,188 466,181 466,195"/><polygon class="arr" points="623,188 611,181 611,195"/><polygon class="arr" points="768,188 756,181 756,195"/>
<text class="s" x="45" y="310">可选：bash install.sh --service 安装 systemd 用户服务，实现重启后自动拉起。</text>
</svg>
